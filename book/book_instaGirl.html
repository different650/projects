        <p>못 먹고 바라만 봐야 하는 포도는 여우에게 여전히 시고 짜증 날 수밖에 없다. 그래. 그럼 나도 안 해. 아쉬우면 지가 찾으로 오겠지. - p.731</p>
        <p>신기루처럼 드리운 환상. 온도 차가 있는 어둠 속엔, 잘못된 빛이 반사한 오로라가 있는 법이니까. - p.125</p>
        <p>너무나 깊은 어둠을 봐 버리면 새벽녘은 도리어 밝은 편이라는 것을 깨닫는다. 빨리 해가 뜨기만을 기다리며 그 방향으로 무작정 달려 나가게 된다. - p.163</p>
        <p>"평범한 게 행복까진 아니어도, 적어도 불행할 확률은 더 낮을지도 몰라요." - p.183</p>
