    <figcaption>
      <h3>사라진 서점</h3>

      <div>
        <p>책은 그저 종이에 적힌 글이 아니라, 다른 장소, 다른 삶으로 통하는 입구라고 아버지는 입버릇처럼 말했다. 나는 책과 그 안에 담긴 무한한 세계를 사랑하게 되었고, 이는 오롯이 아버지 덕분이었다.
          - p.15
        </p>
        <p>"자기는 생각이라는 걸 할 수 있고, 성한 두 손으로 책을 들 수 있고, 튼튼한 두 다리로 어디든 갈 수 있는 성인 여성이야." - p.109
        </p>
        <p>나는 완벽한 녀석을 발견했다. 모양도 크기도 포즈도 각양각색인 도자기 개구리들이 엄청나게 많이 모여 있는 짙은 색 콘솔형 호두나무 탁자. 이것이 수집의 재미다. 어떤 것이 누구에게 가치를 지닐지
          알 수 없다는 것. 우리는 특정 물건을 사랑하도록 미리 운명 지어지는 걸까? 어린 시절의 한순간이 기억에서 잊히더라도 영혼에는 지울 수 없는 표식으로 각인되는 걸까? 이 게임의 매력은, 내가 찾고
          있는 줄도 몰랐던 무언가를 발견해낼 거라는 기대였다. - p.164
        </p>
        <p>"내 말 잘 들어, 마서. 두렵지 않으면, 살아 있는 게 아니야." - p.296
        </p>
        <p>"‘복수의 여정을 시작하기 전, 두 개의 무덤을 파라’는 옛말이 있지." - p.450</p>
      </div>
