      <h3>바다가 들리는 편의점</h3>

      <div>
        <p>"부모가 죽어도 배는 고픈 법이야. 맛있는 걸 못 느낄 정도면 어딘가 심하게 망가진 거라고. 그리고 맛있게 먹어 주지 않으면 음식한테도 미안하잖아?" - p.65</p>
        <p>"표정이나 말투만으로 판단하면 큰 착각을 하게 되지. 그럼 대체 뭘로 판단하나 싶겠지만, 내 생각에는 행동 아닐까 싶어. 우라타 씨는 정말로 우리 가게에 오는 게 즐거우셨을거야. 그도 그럴게, 매일 제일 먼저 오셨잖아. 노미야한테 이런저런 뾰족한 말을 했던 것도 분명 우라타 씨 나름의 응원이었을 거야." - p.68</p>
        <p>"성공한 사람들은 다들 그렇게 말하잖아? 무슨 일이든 계속하지 않으면 소용없다고. 그 나이까지 아무 보상도 없이 꾸준히 했다는 것만으로 재능 아닌가?" - p.125</p>
        <p>신문에 실린 시니어 댄스 동아리에 대한 특집 기사를 읽으며 다키지는 생각했다. 지금까지 일 외의 다른 것에 관심을 둔 적이 없다. 일만 해도 하루가 지나갔고, 딱히 부족함을 느낀 적도 없었다. 하지만 지금은 시간을 때울 무언가가 필요했다. 저런 식으로 누군가와 같이 웃으며 이야기할 수 있는 취미라면 더 좋고…. - p.205</p>
        <p>"우리가 같이 산 게 벌써 몇십 년인데. 내가 당신을 그렇게 키웠듯 나 역시 당신 손에 길러진 부분이 있어. 부부란 원래 서로를 키우는 거니까." - p.247 / p.248</p>
        <p>좌절할 때도, 뜻대로 되지 않는 일도 있었을 것이다. 하지만 두 사람은 언제나 즐거운 마음으로 자신의 인생을 지켜 나가고 있다. 나는 어떨까. 언젠가 다시 농구가 하고 싶어질까. 아니면 또 다른 새로운 세계를 만나 정신없이 빠져들까. 무언가를 좋아하게 되면 마음속 구멍이 메워져 스스로에게 자신감이 생길지도 모른다. 그렇게 되면 좋겠다. - p.303 / p.304</p>
        <p>"뭐, 그렇겠지. 하지만 언제까지라고 기한을 정할 수는 없는 일 같아. 대학에 들어가고 난 다음에 찾을 수도 있고, 사회인이 되고 나서 깨달을지도 모르지. 나만 해도 내가 원하는 일을 하고 있다고 느끼기 시작한 지 몇년 안 됐거든. 내가 그랬는데 아이한테 얼른 정하라고 재촉할 수는 없잖아." - p.367</p>
        <p>"물론 하고 싶은 일을 찾는다는 핑계로 너무 막연하게 사는건 곤란하겠지. 꿈은 둘째 치더라도 한 사람의 인간으로 자립은 해야 하니까. 하지만 나는 그 애가 언젠간 좋아하는 일을 발견할 거라 믿어." - p.367 / p.368</p>
        </div>
