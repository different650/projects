<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>책 기록 입력</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; }
  label, textarea, input, button { display: block; width: 100%; margin-bottom: 10px; }
  textarea { height: 100px; }
  .record { border: 1px solid #ccc; padding: 10px; margin-top: 10px; }
</style>
</head>
<body>

<h2>책 내용 기록하기</h2>

<label for="bookTitle">책 제목</label>
<input type="text" id="bookTitle" placeholder="책 제목 입력" />

<label for="recordContent">기록 내용</label>
<textarea id="recordContent" placeholder="내용 입력"></textarea>

<button id="saveBtn">기록 저장</button>

<h3>저장된 기록</h3>
<div id="records"></div>

<script>
  const saveBtn = document.getElementById('saveBtn');
  const recordsDiv = document.getElementById('records');

  // 로컬스토리지에서 기록 불러오기
  function loadRecords() {
    const records = JSON.parse(localStorage.getItem('bookRecords') || '[]');
    recordsDiv.innerHTML = '';
    records.forEach(({title, content}) => {
      const recordEl = document.createElement('div');
      recordEl.classList.add('record');
      recordEl.innerHTML = `<strong>${title}</strong><p>${content}</p>`;
      recordsDiv.appendChild(recordEl);
    });
  }

  // 저장 버튼 클릭 시
  saveBtn.addEventListener('click', () => {
    const title = document.getElementById('bookTitle').value.trim();
    const content = document.getElementById('recordContent').value.trim();

    if (!title || !content) {
      alert('책 제목과 기록 내용을 모두 입력해주세요.');
      return;
    }

    // 기존 기록 불러오기
    const records = JSON.parse(localStorage.getItem('bookRecords') || '[]');
    records.push({title, content});
    localStorage.setItem('bookRecords', JSON.stringify(records));

    // 화면 갱신
    loadRecords();

    // 입력 필드 초기화
    document.getElementById('bookTitle').value = '';
    document.getElementById('recordContent').value = '';
  });

  // 페이지 로드 시 기록 불러오기
  loadRecords();
</script>

</body>
</html>
