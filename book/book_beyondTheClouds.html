    <figcaption>
      <h3>구름의 저편, 약속의 장소</h3>

      <div>
        <p>지금 나는 여기에 있고 그와 동시에 작은 비행기가 되어서 바람을 가르고 있었다. 내가 비행기를 조종하는 것이 아니었다. 나는 나임과 동시에 비행기였다. - p.65</p>
        <p>"읽고 있을 때 갑자기 와닿는 느낌이 좋아서 그러는 것 같은데……." - p.97</p>
        <p>그 이유는 감정을 내뿜을 대상이 구체적이지 않기 때문이다. 분노의 대상이구체적이지 않다는것은 상당히 골치 아픈 일이었다. 나쁜 감정을 해소할 길이 없기 때문에 끝도 없이 그 감정을 질질 끌고 가게
          된다. - p.209</p>
        <p>어쩔 수 없이 잊히는 것이 있고, 잊고 싶어도 잊지 못하는 것이 있고, 또한 절대로 잊어서는 안 되는 것도 있다. - p.221</p>
        <p>신뢰하는 사람과 관계를 이어 갈 수 있다는 것은 정말 행복한 일이다. 원하기만 하면 전화로 언제든 이야기할 수 있다는 것은 당연한 일처럼 생각되지만, 사실은 더할 나위 없이 값진 일이다. -
          p.281</p>
        <p>사람의 머리에는 무엇으로도 비유하기 힘든 독특한 질량감이 있다. 한 사람의 기억과사고와 정서가 그만한 무게가 되어 내 몸에 실리고 있다는 생각이 들어 살짝 긴장했다. - p.350</p>
        <p>그런 결단을 지나야만 작고 보잘것없는 희망의 싹이 모습을 드러낼 수 있다. '희망'이란 상실을 지나고 선택을 다 하고 결단을넘어야만 보이게 되는 '무언가'의 다른 이름이다. - p.547</p>
      </div>
