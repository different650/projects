      <h3>까라!</h3>

      <div>
        <p>"그렇지만 영국 여자들도 축구를 했고, 요새 미국 여자대학에서두 축구 구락부가 유행이라 하여요. 서양 여자들은 축구로 몸을 단련하는데, 조선 여자는 가벼운 운동만 하면 모체 골격이 작아져서 연약한 자녀를 낳지 않겠어요. 미국인들은 "Man can do-Woman can do"라며 남자가 할 수 있으면 여자두 할 수 있다구 여자에게 축구를 장려하는데 조선인들은 여자들에게 체조, 정구, 육상 같은 제한된 운동이나 시키니 언제 그들만큼 실력을 기르고 나라가 발전하겠어요?" - p.44 / p.45</p>
        <p>저는 권옥의 백지 지원서 내용을 제 것과 같이 ‘장래의 희망은 아직은 없고 지원 동기는 장래의 희망을 만들기 위함’이라고 수정했어요. 지금은, 하고픈 것보다 할 수 있는 게 중요한 시대지 않아요. - p.52</p>
      </div>
