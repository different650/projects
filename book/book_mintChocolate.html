    <figcaption>
      <h3>이까짓, 민트초코</h3>

      <div>
        <p>인간에게 필요한 3대 영양소는 탄수화물과 단백질과 지방이고 그 외에 각종 무기질이나 비타민 따위가 있다고. 만약 필요의 이유라면 나는 내가 좋아하는 음식으로 영양소를 채우고 싶다고. 굳이 먹고
          싶지 않은 음식을 억지로 먹으며 괴로워해야 할 이유가 대체 뭐냐고. 단백질이 필요하면 나는 닭고기와 계란을 먹겠다고. 아버지의 식도락과 나의 식도락이 같아야 할 이유는 없다고. - p.13 / p.14
        </p>
        <p>그런데 '맛있다'는 형용사는 꽤 많은 의미를 내포한다. 미각의 영역에서 간이 적당하다는 의미일 수도 있고, 음식을 씹는 동안 코를 타고 올라오는 냄새가 매력적이라는 의미일 수도 있다. 국밥의
          국물이 뜨거울수록 시원하고 비빔국수는 차가울수록 입맛이 돋는 거처럼 음식의 온도가 적절하다는 의미일 수도 있다. 무취, 무미에 가까운 곤약이 맛있다는 말은 아마도 식감의 영역에서 비롯된 것이리라.
          내가 견디기 힘든 물컹거리는 식감이 누군가에겐 자꾸만 씹어 먹고 싶은 '맛있음'이 되는 것이다. - p.66 / p.67</p>
        <p>어릴 땐 먹어보라는 말에 대뜸 이 음식은 이러저러해서 싫다고 이유부터 밝혔는데, 어른이 되고선 완곡한 거절만 내비친다. 굳이 이유까지 말해가며 편식의 당위성을 확보할 필요가 없다고 생각하기
          때문이다. 상대방의 납득 여부는 내 취향에 아무런 영향을 미치지 못한다. 굳이 먹지 않는 이유를 묻는다면 사람 좋은 미소로 에둘러 대답하겠지만… 먹고 안 먹고는 내 취향이고, 내 선택이라는 점은
          달라지지 않는다. - p.69 / p.70</p>
        <p>사람을 진짜 곤란하게 만드는 건 음흉한 악의가 아니라 무구한 선의일 때가 많다. 악의는 단호한 거절로 받아치면 되는데 선의는 그러기도 힘들다. 상대방의 선의가 나의 괴로움이 될 때는 더욱 그렇다. - p.76</p>
        <p>앞으로만 향하는 길 위에서 가끔 뒤를 돌아 멀어지는 과거를 응시하다 보면 괜히 또 부질없는 후회를 곱씹게 된다. 다시 돌아갈 수 있다면 아버지의 팥 바 아이스크림도 훨씬 더 맛있게 느껴질 텐데.
          TV 화면 대신 아버지의 얼굴을 몇 번 더 쳐다볼 텐데. - p.96</p>
        <p>그런데 신기한 건, 아무 의도 없는 우연들이 층층이 쌓여 필여의 계단이 되기도 한다는 사실이다. 우연을 밟고 걸어나가면 필연적인 결과에 다다른다니, 인생이란 역시 알 수 없다. '알다가도 모를
          것'이 아니라 그냥 알 수 없는 것. 그러니 내가 할 수 있는 일은 그저 먼 우연을 기다리며 가까운 계획을 실천하는 것뿐이다. - p.164</p>
      </div>
