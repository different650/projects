    <figcaption>
      <h3>바다가 들리는 편의점3</h3>

      <div>
        <p>"자기가 발을 들인 곳에서 어떻게든 높이 올라가 보려고 시행착오를 반복하는 모습이 소중한 거야. 난 아루가 어떻게든 더 나서려고 애쓰고, 인상에 남을 만한 말을 하고 싶어 필사적으로 고민하는
          모습을 보면 울컥한다고. 거기다 요즘은 시적인 감성에 빠져 있어서 더 좋아." - p.23</p>
        <p>"그리고 전 제 소중한 사람의 행복이 제 곁에 있는 게 아니라면 떨어져 있어도 괜찮다고 생각해요. 감금이나 구속 같은 그런 류에는 관심도 전혀 없고요." - p.52</p>
        <p>"당신에게는 당신만의 매력이 있잖아요. 당신다운 모습 그대로도 괜찮아요. 전 지금의 당신이 멋지다고 생각해요." - p.54</p>
        <p>"대체 뭐가 어떻게 멋진데요… 아무리 나다운 모습이라도 안 되는 건 안 되는 거예요. 너다운 모습으로 충분하다는 말은 예쁘게 피어난 꽃에게나 줄 수 있는 물 같은 말이에요. 잡초는 뽑히면 끝이죠.
          저는 잡초라고요. 그리고 '멋쟁이 까미귀'기도 하죠. 그 얘기 아세요? 전쟁이 까마귀." - p.54/p.55</p>
        <p>"자신이 가진 걸 갈고닦자, 난 이게 그 이야기의 또 다른 교훈이라고 생각해. 그러니까 당신도 스스로를 갈고닦는 게 어때? 다른 사람의 깃털로 치장하지 말고." - p.56</p>
        <p>"자신의 좋은 점, 어느 정도는 알잖아? 그 부분을 갈고닦아 봐. 스스로 잡초라고 했지만, 수많은 사람 속에서 선택받았으니까 지금 그 화려한 세계에 존재할 수 있는 거잖아. 그렇게 자기 비하할
          여유가 있으면 이길 방법부터 찾아보라고 예를 들면, 이것처럼." - p.56
        </p>
        <p>"약속 장소에서 만나자마자 옷차림이 그게 뭐냐면서 질색하는 표정을 짓더라. 실은 그 눈빛을 본 순간부터 쭉 울 것 같았어. 내 딴에는 제일 예쁜 모습이라고 생각해서 가장 좋아하는 곳을 입고 왔는데
          남자 친구는 화만 내고. 아무렇지 않을 리가 없잖아. 바닷가에서 '창피하니까 좀 떨어져서 걸어'라는 말을 들었을 때는 정말로 울음이 터질 것 같았다니까. 그렇지만, 거기서 내가 울면 안 되잖아.
          울다가, 우는 내가 불쌍해서 더 울고 그러다 보면 완전 눈물의 구렁텅이에 빠지는 거니까. 차라리 엄청나게 화를 내는 게 낫지 않나 싶어서, 내가 봐도 심할 정도로 화를 내기로 결심했어. 그래서 그땐
          거침없이 퍼부었지." - p.95
        </p>
        <p>어떤 놈을 좋아하든 자기 마음이니 누굴 만나든 상관없지만, 상처받은 일에 대해서는 확실히 화를 내라고. 그 말을 듣고 당장 화를 내 보니 '울 일도 아닌 일에 괜히 울고 있었구나'하는 자각이
          들었다고 했다. - p.98</p>
        <p>'무언가'가 되고 싶지만, 대체 무엇이 되면 좋을지, 무엇을 하고 싶은지 알 수 없어 초조하기만 했다. 사진을 포기할 때는 특히 심했다. 유일한 특기라고 생각했던 사진을 그만둔 자신은, 속이 텅
          빈 껍데기와 다를 바가 없어 보였다. 이토록 평범한 내가 앞으로 어떻게 살아갈 수 있을까, 망연자실할 뿐이었다. 그때 곁에 미치오라는 존재가 있었고 그가 '아무것도 아닌'있는 그대로의 모습을 인정해
          줬기 때문에 그 초조함에서 벗어날 수 있었던 건지도 모른다. - p.119
        </p>
        <p>"스스로 더 좋은 길을 모색하고 자신의 힘으로 발견할 수 있다면 그건 무척 훌륭한 일일고 생각해. 나 역시 그걸 해내는 사람들을 동경하고. 하지만 모든 사람이 그렇지는 않잖아. 아무리 조급해하고
          괴로워해도 그것만으론 아무것도 달라지지 않아. 자신에게 필요한 사람을 만나는 타이밍이 있고, 그 타이밍이 와야 시작할 수 있는 사람도 있는 것 같아. 적어도 나는 그렇거든. 그래서 말인데, 주에루도
          꼭 만나야 할 사람을 아직 만나지 못한 걸지도 몰라." - p.123
        </p>
        <p>저 나이대에는 '좋아해'가 참 알기 쉬운 거였는데.
          무리 속에 섞여 들어가는 뒷모습을 보며 생각한다. 성장할수록 점점 더 알기 어려워진다. '좋아해'라는 말로 누군가와 이어져 함께한다는 건 사실 무척 어려운 일 아닐까? '좋아해'로 시작해서 함께
          '행복'을 누리는 것은 더더욱 어렵지 않나? 이런 생각을 하면 마음이 부쩍 무거워진다. - p.140</p>
        <p>"보름달이야! 하아, 가을의 달밤은 정말 아름답구나. 손님들한테 들었는데, 요 며칠 바람이 무척 거셌다며? 봄은 폭풍이 몰고 오는 거라고들 하지만 난, 모든 계적이 폭풍을 타고 오는 것 같아.
          폭풍이 강한 기운으로 다음 계절을 데려오는 거지." - p.229</p>
      </div>
