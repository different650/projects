      <h3>화이트 러시</h3>

      <div>
        <p>마나미가 좋아하는 말은 ‘유능한 매는 발톱을 숨긴다’라는 것이리라. 지금은 직장에 몸담고 있으나 그 신념에는 변함이 없는 듯하다. 활기차게 일할 수 있음을 보여준다고 반드시 높은 평가를 받는 것도 아니다. 심부름꾼처럼 이용당하다가 완전히 소진해 쓸모가 없어지면 버려지는 법이다. - p.203</p>
        <p>자신에게 불행한 일이 생겼을 때 다른 사람도 불행해졌으면 좋겠다고 생각한다면 그건 인간으로서 실격이란다. 오히려 다른 사람이 내 몫까지 행복하길 바래야지. 그러면 틀림없이 그 행복이 넘쳐 내게도 돌아올 테니까. 누군가가 어디선가 불행을 겪으면 다른 사람들은 자신들도 같은 불행을 겪지 않도록 조심하고 최대한 행복해져 그 불쌍한 사람에게 행복이 돌아가게 해야 해. - p.325</p>
      </div>
