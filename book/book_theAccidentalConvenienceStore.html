    <figcaption>
      <h3>어쩌다 편의점</h3>

      <div>
        <p>끝으로 한 가지 비밀을 말해주자면, 편의점의 영수증 하단 귀퉁이에는 OO 두 자리 숫자가 찍혀 있는데 이는 객층 분류 번호다. 주민등록증 번호처럼 앞자리 1은 남자, 2는 여자를 나타내고 뒷자리는
          1부터 5까지 어린이, 중고생, 젊은, 중년, 노인 순으로 표기된다. 이 말은 즉, 근무자가 내 나이를 어떻게 판단했는지 알 수 있다는 뜻이다. - p.94
        </p>
        <p>우리는 매일 아침 '오늘 뭐 입지?'를 고민한다. 옷은 그 사람의 개성과 정체성을 나타내는 요소다. 하지만 많은 사람들이 옷을 단지 외모를 꾸미는 수단으로만 생각할 뿐 그 옷차림이 정작 우리
          내면을 단장시켜준다는 사실은 잘 알지 못한다. 옷을 입는 행위는 '남들에게 내가 어떻게 보이고 싶다'를 설정하기 이전에 '내가 나를 어떤 사람으로 정의하느냐'의 문제다. 스타일은 남을 위한 것이
          아닌 나를 위한 것이 되어야 한다. 어떤 옷을 입느냐에 따라 나의 마음가짐이 달라지고 나의 하루, 나의 인생이 바뀔 수 있기 때문이다. 남의 시선을 통한 나보다 나에게 비친 내 모습이 멋있을 때
          그게 진짜 옷을 잘 입는 거 아닐까? - p.101
        </p>
        <p>이름은 그 사람을 소개하는 첫 번째 수단이며 본체의 존재와 인격을 상징한다. - p.104
        </p>
        <p>『그리스인 조르바』를 쓴 소설가 니코스 카잔차키스도 현실을 바꿀 수는 없으니 현실을 바라보는 눈을 바꿔야 햔다고 말하지 않았나. 모든일은 분명 그만의 소중한 의미와 가치가 있다. - p.113
        </p>
        <p>나는 편의점에서 인생의 지혜를 또 하나 배웠다. 소유는 나만 즐거운 것이고 나눔은 모두를 즐겁게 한다는 것. 그리고 그로 인한 행복은 묵직한 기억의 질량으로 오래도록 보존된다는 것. - p.119
        </p>
        <p>'여기엔 별게 다 있네?' 일본에서는 보기만 해도 눈이 즐거운 아기자기한 디저트 앞에서 인생의 풍요로움을 느꼇고, 중국에서는 차엽단(찻잎과 간장을 넣은 물로 삶은 계란)에서 기다림으 지혜를
          얻었다. 대만에서는 한여름에도 뜨거운 어묵과 딤섬을 아이스크림 팔 듯 파는 걸 보며 뚝심을 배웠으며, 스페인에서는 오렌지를 넣으면 리얼 찾즙 주스가 만들어지는 벤딩 머신 앞에서 진정성의 의미를
          되새겻다. 미국 편의점은 대부분 주유소에 있었는데 영화에서처럼 언제 총을 든 강도가 들이닥칠지 몰라 그리 오래 머물진 않았다. 단지 과자, 음료수, 핫도그, 심지어 근무자의 덩치까지 모든 게 엄청
          컸다고 기억한다. 대대익선이 영업 전략인 듯. - p.204 / p.205
        </p>
        <p>그럴 때 있잖나. 가끔 천재가 되고 싶을 때. 하지만 내 안의 창의력을 쥐어짜면 쥐어짤수록 생각은 복잡해지고 아이디어는 무거워졌으며 그나마 보유한 얕은 유머마저 시들해졌다. 나의 창의력은 그야말로
          창백했다. 살아 있는 것이라면 보약이라도 지어 먹이고 싶었다. 한약은 달이면 달일수록 약효가 좋다지만 나의 창의력은 정성을 들이면 들일수록 쓰고 새까맣게 변했다. '이 봐라. 갖다 붙인 비유도
          얼마나 탁하고 고루한가?' - p.226 / p.227
        </p>
