      <h3>칵테일, 러브, 좀비</h3>

      <div>
        <p>물은 어째선지 무서워졌다. 저렇게 자신을 직시하는 눈빛은 너무 오랜만이었다. 어쩌면 유령이 된 후 로 처음일지도. 공포에 떨거나 화를 내거나 욕을 지껄이지 않고 자신을 보는 눈빛은 정말로 처음이었다. 그런 시선에는 면역이 없었다. 차라리 누군가가 빨리 도망가 버렸으면 했다. 그래서 다른 사람들에게 했던 대로, 희고 마른 손목을 휘휘 흔들었다. "도망가라, 도망가라." 숲속의 누군가는 도망가지 않았다. 아무리 팔을 흔들어도 그 자리에 있었다. 물은 울고 싶어졌다. 도망가기는 커녕 오히려, 물만큼이나 앙상한 손을들어 올리고는 물이 했던 것처럼 휘휘 흔들기 시작했다. "안녕." - p.49</p>
