    <figcaption>
      <h3>아무튼, 게스트하우스</h3>

      <div>
        <p>도토리를 숨겨놓고 잊어버려 결국 상수리 숲을 키우고 마는 다람쥐들처럼 어릴 적에 어딘가 묻어두고 그대로 잊어버렸던 아이의 마음, 유머 감각, 어쩌면 순수하고 자신감이라고도 부를 수 있을 만한 어떤
          것이 내 속의 숲에 하나둘 싹을 틔운다. - p.19
        </p>
        <p>이국의 거리를 혼자서 다녀보고 싶은 마음, 그렇지만 길을 잃고 싶지는 않은 마음이었겠지. 어찌보면 그냥 밤에 걸었다는 것뿐인 대수롭지 않은 이야기인데, 그 이야기를 들려줄 때의 아버지의 눈빛을
          나는 아직도 자랑스럽게 기억한다. 모든 첫걸음은 그렇게 시작되는 것이고 그가 몇 살이건 어떤 인간이건 어디에선가는 우리는 첫걸음을 떼어야 하는 것이다. - p.30
        </p>
        <p>당신과 대충 비슷한 하루를 보냈을 그들은 이 저녁 사랑방에서 당신과 대충 비슷한 마음일 것이다. 최소한 그렇게 착각한다고 심각한 죄가 되지는 않을 것이다. 인간이라는 동물에게 결국 필요한 것은
          낮에 뛰어다닐 사냥터와 밤에 그 얘기를 들어줄 친구라고 하니까. - p.33
        </p>
        <p>친구를 구한다고 여기저기 떠벌리는 일은 어쩐지 애처롭다. 사랑과 마찬가지로 진짜 친구도 구하기보다는 만나지는 것이니까. 외로워도 안달하지 말고 어느 정도 운에 맡기는 편이 좋다. 굳이 준비랄 게
          있다면 막상 인연이 닿았을 때 알아챌 수 있는 감각, 이쪽에서 도망치지 않을 정도의 마음이다. 친구는 이리저리 헤매며 걷는 길을 잠깐 옆에서 같이 걸어가는 존재이지 목표가 될 수는 없다. 운이
          따르지 않으면 그뿐인 것이다. - p.60
        </p>
        <p>불가에서는 세탁기를 가끔씩 멈추는 것을 명상이라 부르고, 완전히 코드를 뽑아 다시는 돌지 않게 된 상태를 깨달음이라 부르는 것 같다. - p.101</p>
