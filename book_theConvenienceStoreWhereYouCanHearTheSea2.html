    <figcaption>
      <h3>바다가 들리는 편의점2</h3>

      <div>
        <p>"응, 대단한 사람 같은 건 없어. 그냥 모두 열심히 노력하는 것뿐이지" - p.70</p>
        <p>"누구와 어떻게 헤어지더라도 존엄성만큼은 소중히 지켜줘야지. 아직 어리니까 거기까지 생각이 못 미쳤을지도 몰라. 어떤 식으로든 자기 방식이 옳지 않았다는 걸 깨달으면 좋을텐데. 마음 아픈 일을
          겪었구나, 시노" - p.72</p>
        <p>"누군가를 좋아하는 건 좋은 일이야. 그건 정말 좋단다." 시노에게, 그리고 미쓰에 스스로에게 하는 말처럼 들렸다. 나이가 몇 살이든 사람을 좋아할 수 있어. 상대를 좋아하는 동안은 그 사람을
          좋아하는 자신까지 좋아했으면 좋겠어. 그 사람을 소중히 여기면서, 그만큼 자기 자신도 아껴 주는 거야. 소중한 그 사람에게 어울리는 스스로가 되도록 노력하게 만드는 '좋아해'의 마음을 느끼면 그건
          분명 행복일 거야. - p.72</p>
        <p>"너를 그렇게 대하는데도 의연하게 대처했잖아? 사람들은 자신의 소중한 부분은 결국 스스로 지켜 내야 한다는 사실을 쉽게 잊어. 남이 자신을 짓밟아도 별수 없다며 포기해 버리는 사람도 있지. 나도
          그랬어. 내 소중함을 지키는 게 결국엔 내 이기심이 아닐까. 좋은 아내로서 실격 아닌가. 이런 바보같은 생각으로 그런 취급을 자처하기도 했지. 이제 와 후회가 되기도 해. 그런데 시노는 그 어린
          나이에 자신을 지키는 방법을 알고 있잖아. 정말 대단해." - p.73</p>
        <p>"아, 그렇다고 다로짱이 나쁘단 뜻은 아니야. 내 경험이 부족했다고 할까, 세상을 너무 몰랐던 것 같아. 다로짱보다 더 반짝반짝 빛나는 사람이 이렇게나 많다는 걸 그땐 몰랐어. 비유하자면,
          반딧불이 빛이 전부인 줄 알았던 세상에서 불꽃이나 전기를 발견했다고나 할까. 훨씬 더 반짝이는 것들이 많더라고." - p.95</p>
        <p>"온몸을 깊이 던져 그 세계에 완전히 젖어 버린 사람에게도 빠져들고 싶지만, 광활한 세상으로 데려가 줄 것 같은 사람이 마구 나를 데리고 놀아 줬으면 하는 마음도 든다는 거잖아. 둘 다
          매력적인데. 난 어느 쪽이든 다 좋아." - p.120
        </p>
        <p>"이런 일은 이어져야 한다고 생각하거든. 배려나 상냠함 같은 건 다른 사람에게 전하면 전할수록 소중해지니까." - p.171
        </p>
        <p>"우리는 오랜 시간 같은 공간에서 같은 사람을 보고 있어. 같은 이야기를 나누며 같이 웃을 수 있잖아. 그러니까 아무것도 모른다는 식으로 말하지 않았으면 좋겠단다." - p.180
        </p>
        <p>"친구가 되려면 그 사람을 위해 뭔가 해 줘야겠다는 생각이 들어서." - p.200</p>
        <p>나쁜 일이든 함께 깨닫고 함께 반성하려면 같은 세대를 살아가는 또래 친구를 만나는 것이 좋다고. 조급해하지 않아도 되니 꾸준히 찾아보라고. 타이밍이 맞을 때 말을 걸라고. 다들 그렇게 말했단다.
          그래서 난 계속 친구를 찾고 있었단다. - p.204
        </p>
        <p>그래서 선생님과 헤어지고 돌아오는 길에 울면서 엄마한테 사죄했어. 그랬더니 엄마가 반성했으면 절대로 같은 실수를 하지 말라고 하더라. 원래 아이들은 실수도 많이 하고, 때로는 잘못을 저지르기도
          하는 미숙한 존재라고, 그래서 처음한 잘못은 절대로 혼내지 않을 거라고. 다만, 확실히 후회하고 반성해서 다시는 그런 일이 없도록 하라고 하셨어. 사람은 그렇게 어른이 되는 거라고. - p.207
        </p>
        <p>"엄마, 나 용서해 주는 거야? 하고 물으니 소중한 사람의 실패는 함께 극복해 가는 거라고 하셨어." - p.207
        </p>
