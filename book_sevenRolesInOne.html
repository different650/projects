      <h3>7인 1역</h3>

      <div>
        <p>“전혀. 걱정할 거 없어. 나는 성공하고 싶거든. 유럽에서도 유명해질 거야. 마르탱이 디자인한 의상을 입을 수만 있다면 어떤 아픔이라도 견뎌야지. 게다가 나는 상처 따위 무섭지 않아. 인간의 몸이란 상처 입기 위해 존해하는 거야…. 하긴 중요한 상품이니까 조시미해야겠네.” - p.176</p>
        <p>내 나이대의 시선으로 보면 아직도 유치한 데가 있는 레이코는 평소에 강하게 나오는 자일수록 밑바닥까지 추락했을 때 더 무르고 약하다는 것을 알 리가 없었다. 어떤 악인이라도 죽음을 마주하면 지금의 나처럼 자신의 죄를 고백하고 싶은 충동에 휩싸인다는 것도 알지 못하는 나이였다. - p.340</p>
      </div>
