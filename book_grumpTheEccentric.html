    <figcaption>
      <h3>괴짜 노인 그럼프</h3>

      <div>
        <p>사업가에게 모든 사람들은 고객이고 그는 모든 이에게 사업가다. 좋은 사업가는 거만하지 않고 집을 짓는 데 필요한 건축자재를 신용카드로 구입하는 고객과 동전만 가득한 저금통을 가진 꼬마 손님을
          동등하게 대할 줄 안다. 사탕을 사는 그 꼬마가 자라서 집을 짓는 고객이 된다. 상품을 잘 포장하는 것도 중요하지만, 잘 팔리기 위해서는 그 상품이 정말로 고품질이어야 한다. 그런 상품은 비싸도
          된다. - p.32</p>
        <p>컴퓨터에 들어 있는 정보들을 꺼내고, 머릿속에 든 것을 꺼내지 않으면 멍청하게 된다. 컴퓨터가 다운되면 머리에 든 것이 없는 사람들은 덩달아 쓰러지게 될 것이다. 내비게이션이 없으면 아무 데도 못
          가고, 텔레비전 프로그램이 없으면 감정을 느낄 수 없다. 미안하지만, 이게 바로 이천 몇 년, 지금 사람들의 모습이다. - p.54</p>
        <p>아무튼 기어를 바꿀 때에는 타이밍을 잘 잡아야 한다. 자동차는 사람과 같아서 오랫동안 운전하고 길을 들이다 보면 차를 잘 알게 된다. 사람도 마찬가지다. 사람마다 특별하게 더 민감한 곳이 있어서
          잘 만져줘야 한다. - p.59</p>
        <p>단순히 기쁘고 슬픈 것에 만족하지 않고 반드시 왜 기쁜 것인지 왜 슬픈 것인지 이유를 알아야 하는가? 별것도 아닌, 남들도 다 하는 고만고만한 걱정거리를 가지고 온 세상 사람들에게 떠든다. 즐거운
          일이 있으면 커피에 크림을 타서 마시면 그만이다. 슬픈 일이 있으면 커피를 블랙으로 마시면 된다. - p.61</p>
        <p>내 자신의 고통은 얼마든지 짊어지고, 한 군데 모아서 뒷간에 내버릴 수 있다. 타인의 고통은 너무나도 무겁다. - p.64
        </p>
        <p>도시의 불빛은 인간에게 모닥불을 연상시킨다. 근처에서 온기가 느껴지고 주변에 동료가 있음을 안다. 하루를 더 버텨서 다시 모닥불을 피울 수 있다면 사나운 맹수에게 공격을 당하거나 굶어 죽을 일은
          없으리라는 것 알고 있다. - p.102</p>
        <p>사람이 자신의 감정을 나타내는 것은 아무 쓸모가 없다. 얼굴 표정은 거창한 말과 같아서 극한의 위기에 처한 경우에만 사용하여야 한다. - p.121</p>
        <p>잘 몰라서 확신이 서지 않는다면 도움이 되는 방법이 있다. 하룻밤 자고 다음 날 다시 생각하는 것이다. 어제는 절망에 빠져 있던 사람들도 아침에는 명쾌하게 문제의 해결 방향을 볼 수 있다. -
          p.126</p>
        <p>우리 모두는 서로를 인정해야 할 필요가 있다. - p.187</p>
        <p>너무 깊게 생각하면 할수록 더 어려워진다고 제일 먼저 생각나는 것이 바로 맞는 답이라고 말하고 싶었다. - p.196
        </p>
        <p>인간은 현명한 동시에 어리석기도 하다. 가능한 여러 종류의 안경을 쓰고 타인을 바라보아야 한다. 사진을 한장 찍고 몇십 년 후에 봐서 그 사람에 대한 생각이 여전히 같은지 생각해본다. 가까이서
          보면 놓치고 보지 못하는 것이 꼭 있다. - p.284</p>
      </div>
