    <figcaption>
      <h3>아무튼, 서재</h3>

      <div>
        <p>하지만 책을 사랑한다면, 책에 담긴 내용만큼 책이라는 형식을, 육체를 사랑한다면 깊이 고민해볼 문제라고 말하고 싶다. 올바른 문화라는 것, 아름다운 사랑이라는 것은 결국 선택과 집중이 아니라
          '균형'의 문제라고 생각하기 때문이다. 책을 사랑하는 사람이 가져야 할 균형이, 책장에 있다. - p.32
        </p>
        <p>나는 커피 두어 잔 값에 불과한 책이라는 물건 이 가진 이러한 '무게감'에 깊은 아이러니를 느낀다. 그 무게감은 아마도 책이 사람과 세상을 바꾸는 근본 적인 힘 중의 하나라는 믿음에서
          비롯되었으리라 짐작된다. 어느 대형 서점의 광고 문구처럼 "사람은 책을 만들고 책은 사람을 만든다"라는 믿음. 결국 책에 한 개인을, 그리고 시대를 바꾸는 힘이 있다는 전제가 이 모든 믿음을
          가능하게 하고 있다. - p.71
        </p>
        <p>"아무리 도서관이 거대 하다 할지라도 똑같은 두 권의 책은 없"는 것처럼, 똑같은 기억은 존재하지 않는다. 도서관은 하나의 기억을 보관하지만, 도서관을 이용하는 사람이 건네받는 것은 각기 다른
          기억이다. 도서관의 서고 사이를 걷다 보면 나는 묘한 감정, 애틋함이라고 말할 수 있을 감정을 느낀다. 뱉어지고 사라졌을 말들이 문자를 통해 종이에 기록되고 책으로 묶여 나란히 줄지어 서있는
          것이다. 소멸을 거부하고 기억되기를 바라며 서있지만, 전해져 이어지는 기억은 그들이 원했던 모습이 아니다. - p.113
        </p>
        <p>1980년 4월, 여든한 살의 보르헤스는 매사추세츠 공과대학에서 윌리스 반스톤과 나눈 대화에서 이렇게 말한다. "나는 인생이, 세계가 악몽이라고 생각 해요. 거기에서 탈출할 수 없고 그저 꿈만
          꾸는 거죠. 우리는 구원에 이를 수 없어요. 구원은 우리에게 차단되어 있지요. 그럼에도 나는 최선을 다할 겁니다. (…) 나는 실패했고, 실패할 것을 알지만, 그것이 내 삶을 정당화할 유일한
          행위이니까요." 나는 보르헤스가 취하는 이러한 아이러니를 탈출구가 없는 하나의 진지한 유머로 읽는다. - p.120
        </p>
        <p>서재를 가져라. 당신만의 서재를 가져라. 명창 정궤. 밝은 빛이 스며들고 정갈한 책상 하나로 이루어진 당신만의 서재를 가지는 일이 당신 자신의 모습으로 살아가는 첫걸음이 될 것이다. 조선의 선비가
          그랬던 것처럼. - p.139</p>
      </div>
